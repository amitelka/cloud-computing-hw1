name: CI Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      dynamodb-local:
        image: amazon/dynamodb-local:latest
        ports:
          - 8000:8000

    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          cd app
          pip install -r requirements.txt
          pip install ruff
      - name: Lint with ruff
        run: |
          ruff check app/ tests/
      
      - name: Test with pytest
        run: |
          cd app
          pytest ../tests/ -v --cov=. --cov-report=term --cov-report=xml
        env:
          DYNAMODB_LOCAL: "true"
          DYNAMODB_ENDPOINT: "http://localhost:8000"
          DYNAMODB_TABLE: "parking-tickets-test"
          AWS_REGION: "eu-central-1"
          AWS_ACCESS_KEY_ID: "testing"
          AWS_SECRET_ACCESS_KEY: "testing"
          
      - name: Upload coverage report
        uses: codecov/codecov-action@v3
        with:
          file: ./app/coverage.xml
          fail_ci_if_error: false
          
  validate-cloudformation:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:      - uses: actions/checkout@v3
      
      - name: Set up AWS CLI
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-central-1
      
      - name: Validate CloudFormation Template
        run: |
          aws cloudformation validate-template --template-body file://deploy/template.yaml
          aws cloudformation validate-template --template-body file://deploy/dynamodb-cloudformation.json
